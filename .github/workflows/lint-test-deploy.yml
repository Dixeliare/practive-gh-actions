name: Lint,Test,Deploy
on: push
jobs:
  development-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run test
        run: npm run test
      - name: Build
        run: npm run build